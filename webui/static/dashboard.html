<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{topic}} — Cognitive Dashboard</title>
<link rel="stylesheet" href="/static/styles.css" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>var DATA = {{data}}; var REFS = {{refs}};</script>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<div class="bg-orb orb-3"></div>

<header>
  <div class="logo">
    <span class="logo-icon">◈</span>
    <h1>Morphos</h1>
  </div>
  <nav>
    <a href="/">Home</a>
    <a href="/#?topic={{topic}}">Dashboard</a>
  </nav>
</header>

<div id="loading" class="loading-overlay"><div class="spinner"></div></div>

<main class="dash-container">

  <!-- ─── Header ──────────────────────────────── -->
  <section class="dash-header">
    <div class="dash-title-group">
      <h2 class="topic-name">{{topic}}</h2>
      <p class="essence-line" id="essenceLine"></p>
    </div>
    <div class="controls-group">
      <a href="/" class="back-link">← New Topic</a>
      <a href="/api/json?topic={{topic}}" class="btn-export-json" target="_blank">{ } Export JSON</a>
    </div>
  </section>

  <!-- ─── Dimensions ─────────────────────────── -->
  <p class="section-title">Cognitive Dimensions</p>
  <div class="dim-section" id="dimSection"></div>

  <!-- ─── Concepts ───────────────────────────── -->
  <p class="section-title">Core Concepts</p>
  <div class="concept-grid" id="conceptGrid"></div>

  <!-- ─── Sequence Blocks ────────────────────── -->
  <div id="seqArea"></div>

  <!-- ─── Causal Loops ───────────────────────── -->
  <div id="loopArea"></div>

  <!-- ─── Matrices ───────────────────────────── -->
  <div id="matrixArea"></div>

  <!-- ─── Knowledge Graph ────────────────────── -->
  <p class="section-title">Knowledge Graph</p>
  <div class="graph-canvas-wrap">
    <canvas id="graphCanvas"></canvas>
  </div>

  <!-- ─── Scale Layers (expert) ──────────────── -->
  <div id="scaleArea"></div>

  <!-- ─── Compression / Expert Notes ─────────── -->
  <div id="compArea"></div>

  <!-- ─── References ─────────────────────────── -->
  <p class="section-title">References</p>
  <ul class="ref-list" id="refList"></ul>

</main>

<footer>Built with Morphos · Powered by local LLMs</footer>

<script src="/static/dash.js"></script>
</body>
</html>
